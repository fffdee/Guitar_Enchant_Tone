# ESP-GT-XFORM 条件 DDSP 训练配置
# 该文件中的键会覆盖 config.py 中 dataclass 的默认值（缺失项用默认值）。

audio:
  sample_rate: 48000
  frame_size: 1536      # 分析窗长（样点）
  hop_size: 512         # 帧移（样点）≈ 10.67 ms
  fft_size: 2048        # 补零 FFT 点数

feature:
  feature_dim: 20       # 吉他侧输入特征维度
  n_mfcc: 13
  n_mels: 26
  fmin: 30.0
  fmax: 20000.0
  f0_min: 55.0          # 吉他最低 ~A1
  f0_max: 1320.0        # 含高把位+泛音余量
  rolloff_percent: 0.85
  silence_db: -60.0     # 低于此响度判为静音

ddsp:
  n_harmonics: 30       # 谐波幅度维度
  n_noise_bands: 10     # 噪声子带维度
  output_dim: 40        # n_harmonics + n_noise_bands

model:
  embedding_dim: 8
  channels: [32, 64, 128, 64]   # 各卷积层通道
  kernel_size: 3
  dilations: [1, 2, 4, 1]
  film_layers: [1, 2]           # 在第 2、3 个卷积块后施加 FiLM（0-based 索引）

train:
  batch_size: 16        # 序列级 batch（每条为一段连续帧）
  sequence_length: 64   # 每条训练样本的帧数 ≈ 0.68 s
  epochs: 100
  lr: 0.001
  weight_decay: 0.01
  noise_loss_weight: 0.5
  use_stft_loss: false  # 第一版关闭，跑通后再开启
  stft_loss_weight: 0.1
  val_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  num_workers: 0        # Windows 下建议 0
  render_every: 10      # 每多少 epoch 渲染一次 demo
  grad_clip: 1.0

paths:
  raw_wav_dir: data/raw_wav
  manifest_path: data/processed/manifests/manifest.csv
  features_dir: data/processed/features
  labels_dir: data/processed/labels
  splits_dir: data/processed/splits
  output_dir: outputs
